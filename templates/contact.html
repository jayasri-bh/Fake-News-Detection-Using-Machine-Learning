<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            text-align: center;
            background: url("{{ url_for('static', filename='contact.gif') }}") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.65);
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 6px #000000;
        }

        .info {
            font-size: 1.3rem;
            margin: 12px 0;
            text-shadow: 1px 1px 4px #000000;
        }

        .btn {
            margin-top: 40px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 6px 12px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0px 10px 18px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #ff512f, #dd2476);
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h2>📞 Contact Information</h2>
        <p class="info">👩‍🎓 <b>Name:</b> DIVYA</p>
        <p class="info">🏫 <b>College:</b> DNR CLG</p>
        <p class="info">📱 <b>Phone:</b> 7765432122</p>
        <p class="info">📧 <b>Email/Contact:</b> https://dnrcollege.org/en/</p>
        <a href="/home"><button>home</button></a>
        
    </div>
</body>
</html>
