<!DOCTYPE html>
<html>
<head>
    <title>Sign Up -Generative AI-Driven Fake News Detection And Rewriting Framework Using GPT</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
            color: #e2e8f0;
        }

        .card {
            width: 420px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* Button */
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #2563eb, #06b6d4);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(37,99,235,0.6);
        }

        /* Links */
        .link {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #cbd5f5;
        }

        .link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* Flash messages */
        .flash {
            background: rgba(239,68,68,0.15);
            border-left: 4px solid #ef4444;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            color: #fecaca;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<body>

    <div class="card">

        <h2>🧾 Create Secure Account</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="flash">⚠️ {{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
            <input name="username" placeholder="👤 Full Name" required />
            <input name="phone" placeholder="📱 Phone (10 digits)" pattern="\d{10}" title="10 digits" required />
            <input name="email" type="email" placeholder="📧 Email Address" required />
            <input name="password" type="password" placeholder="🔑 Password" required />

            <button type="submit">Create Account</button>
        </form>

        <p class="link">Already have an account? <a href="{{ url_for('signin') }}">Sign In</a></p>
        <p class="link"><a href="{{ url_for('home') }}">← Back to Home</a></p>

    </div>

</body>
</html>
